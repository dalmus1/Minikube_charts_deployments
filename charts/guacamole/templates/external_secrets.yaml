{{- if and .Values.externalSecrets (eq (.Values.externalSecrets.enabled | default false) true) }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "guacamole.fullname" . }}-db-password
  labels:
    {{- include "guacamole.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.store.kind | quote }}
    name: {{ .Values.externalSecrets.store.name | quote }}
  target:
    name: {{ .Values.externalPostgres.existingSecret.name | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
      secretKey: {{ .Values.externalPostgres.existingSecret.key | quote }}
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKey | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}