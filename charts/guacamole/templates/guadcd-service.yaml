apiVersion: v1
kind: Service
metadata:
  name: guacd
  labels:
    {{- include "guacamole.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: guacd
      port: {{ .Values.service.guacd.port }}
      targetPort: guacd
  selector:
    app.kubernetes.io/component: guacd
    {{- include "guacamole.selectorLabels" . | nindent 4 }}
