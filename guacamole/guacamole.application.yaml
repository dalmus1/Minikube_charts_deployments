apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guacamole
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: guacamole

  source:
    repoURL: "https://github.com/dalmus1/Minikube_charts_deployments.git"
    targetRevision: main
    path: "charts/guacamole"
    helm:
      valueFiles:
        - ../../guacamole/guacamole.values.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
